<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<h1>Tabungan Varz</h1>
    <p>UNTUK RAKIT PC</p>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:15px;
}

h1{
    text-align:center;
}

.summary{
    position:sticky;
    top:0;
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    z-index:100;
}

.progress{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.bar{
    width:0%;
    height:100%;
    background:#4CAF50;
    transition:0.3s;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
    vertical-align:top;
}

th{
    background:#4CAF50;
    color:white;
}

input{
    width:90px;
    padding:6px;
    text-align:center;
    border:1px solid #ccc;
    border-radius:6px;
}

.hari{
    font-size:12px;
    margin-bottom:4px;
    color:#666;
}

@media(max-width:768px){
    input{
        width:70px;
    }
}
</style>
</head>
<body>

<h1>💰 Tabungan Varz</h1>

<div class="summary">
    <div>📅 Hari Terisi: <b id="hari">0</b> / 667</div>
    <div>💵 Total Tabungan: <b>Rp <span id="total">0</span></b></div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>
</div>

<table>
<thead>
<tr>
    <th>Minggu</th>
    <th>Senin</th>
    <th>Selasa</th>
    <th>Rabu</th>
    <th>Kamis</th>
    <th>Jumat</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<script>

const TOTAL_HARI = 667;
const HARI_PER_MINGGU = 5;

const tabel = document.getElementById("tabel");

let nomorHari = 1;
let mingguTotal = Math.ceil(TOTAL_HARI / HARI_PER_MINGGU);

for(let minggu=1; minggu<=mingguTotal; minggu++){

    let row = document.createElement("tr");

    let html = `<td><b>Minggu ${minggu}</b></td>`;

    for(let d=0; d<5; d++){

        if(nomorHari <= TOTAL_HARI){

            html += `
            <td>
                <div class="hari">Hari ${nomorHari}</div>
                <input
                    type="text"
                    class="uang"
                    data-hari="${nomorHari}"
                    placeholder="0"
                    oninput="formatRupiah(this); updateTotal(); saveData();">
            </td>
            `;

            nomorHari++;

        } else {
            html += "<td>-</td>";
        }
    }

    row.innerHTML = html;
    tabel.appendChild(row);
}

function formatRupiah(input){

    let angka = input.value.replace(/\D/g,'');

    input.value = angka
        ? Number(angka).toLocaleString('id-ID')
        : '';
}

function updateTotal(){

    let total = 0;
    let terisi = 0;

    document.querySelectorAll(".uang").forEach(input=>{

        let nilai = Number(
            input.value.replace(/\./g,'')
        ) || 0;

        total += nilai;

        if(input.value.trim() !== ''){
            terisi++;
        }
    });

    document.getElementById("total").textContent =
        total.toLocaleString('id-ID');

    document.getElementById("hari").textContent =
        terisi;

    document.getElementById("bar").style.width =
        ((terisi / TOTAL_HARI) * 100) + "%";
}

function saveData(){

    let data = {};

    document.querySelectorAll(".uang").forEach(input=>{

        data[input.dataset.hari] = input.value;
    });

    localStorage.setItem(
        "tracker_tabungan_667",
        JSON.stringify(data)
    );
}

function loadData(){

    let data = JSON.parse(
        localStorage.getItem("tracker_tabungan_667")
    );

    if(!data) return;

    document.querySelectorAll(".uang").forEach(input=>{

        let value = data[input.dataset.hari];

        if(value){
            input.value = value;
        }
    });

    updateTotal();
}

loadData();

</script>

</body>
</html>
